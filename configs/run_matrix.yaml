schema_version: 1

defaults:
  tensor_parallel_size: 1
  max_model_len: 32768
  gpu_memory_utilization: 0.90
  seed: 42
  trust_remote_code: false
  gated: false

models:
  - id: qwen2.5-32b
    hf_repo: Qwen/Qwen2.5-32B-Instruct
    runs:
      - quant_level: fp16_baseline
        quant_method: none
        dtype: float16
        bnb_args: null
      - quant_level: int8_bnb
        quant_method: bitsandbytes
        dtype: float16
        bnb_args:
          load_in_8bit: true
          load_in_4bit: false
      - quant_level: int4_nf4_bnb
        quant_method: bitsandbytes
        dtype: bfloat16
        bnb_args:
          load_in_8bit: false
          load_in_4bit: true
          bnb_4bit_quant_type: nf4
          bnb_4bit_compute_dtype: bfloat16
          bnb_4bit_use_double_quant: false
      - quant_level: int4_nf4_doublequant_bnb
        quant_method: bitsandbytes
        dtype: bfloat16
        bnb_args:
          load_in_8bit: false
          load_in_4bit: true
          bnb_4bit_quant_type: nf4
          bnb_4bit_compute_dtype: bfloat16
          bnb_4bit_use_double_quant: true

  - id: gemma4-31b
    hf_repo: google/gemma-4-31B-it
    trust_remote_code: true
    vllm_extra_args:
      limit_mm_per_prompt: '{"image": 0, "audio": 0, "video": 0}'
    runs:
      - quant_level: bf16_baseline
        quant_method: none
        dtype: bfloat16
        bnb_args: null
      - quant_level: int8_bnb
        quant_method: bitsandbytes
        dtype: bfloat16
        bnb_args:
          load_in_8bit: true
          load_in_4bit: false
      - quant_level: int4_nf4_bnb
        quant_method: bitsandbytes
        dtype: bfloat16
        bnb_args:
          load_in_8bit: false
          load_in_4bit: true
          bnb_4bit_quant_type: nf4
          bnb_4bit_compute_dtype: bfloat16
          bnb_4bit_use_double_quant: false
      - quant_level: int4_nf4_doublequant_bnb
        quant_method: bitsandbytes
        dtype: bfloat16
        bnb_args:
          load_in_8bit: false
          load_in_4bit: true
          bnb_4bit_quant_type: nf4
          bnb_4bit_compute_dtype: bfloat16
          bnb_4bit_use_double_quant: true

  - id: llama3.3-70b
    hf_repo: meta-llama/Llama-3.3-70B-Instruct
    gated: true
    max_model_len: 32768
    gpu_memory_utilization: 0.92
    runs:
      - quant_level: int8_baseline
        quant_method: bitsandbytes
        dtype: float16
        bnb_args:
          load_in_8bit: true
          load_in_4bit: false
      - quant_level: int4_nf4_bnb
        quant_method: bitsandbytes
        dtype: bfloat16
        bnb_args:
          load_in_8bit: false
          load_in_4bit: true
          bnb_4bit_quant_type: nf4
          bnb_4bit_compute_dtype: bfloat16
          bnb_4bit_use_double_quant: false
      - quant_level: int4_nf4_doublequant_bnb
        quant_method: bitsandbytes
        dtype: bfloat16
        bnb_args:
          load_in_8bit: false
          load_in_4bit: true
          bnb_4bit_quant_type: nf4
          bnb_4bit_compute_dtype: bfloat16
          bnb_4bit_use_double_quant: true

  - id: mixtral-8x7b
    hf_repo: mistralai/Mixtral-8x7B-Instruct-v0.1
    known_risk: >
      bnb support for MoE/Mixtral has historically been unstable in vLLM
      (see vllm-project/vllm PR #20061, issue #20480, RFC #39583).
      Run spike_tests/spike_test_mixtral_bnb.py before trusting these entries.
      CONFIRMED (2026-07-17, see spike_test_error_report.md): this is a structural
      incompatibility, not just a memory/OOM issue. This transformers version stores all 8
      MoE experts as two fused 3D parameter tensors per layer (gate_up_proj/down_proj) rather
      than separate nn.Linear modules; bitsandbytes' int8 path only quantizes nn.Linear
      instances, so it silently skips the fused expert tensors entirely -- ~96% of Mixtral's
      params (~45B of ~47B) stay in full bf16 regardless of device_map, CPU offload, or
      streaming technique. The resulting "quantized" checkpoint is barely smaller than the
      original, which is why it OOMs on a single 95GB H100 (Mixtral is ~94GB in fp16) --
      no amount of memory-management engineering fixes this, since there's nothing to save.
      Not pursued yet: (a) a community-published, MoE-aware pre-quantized Mixtral checkpoint
      (GPTQ/AWQ/bnb) from Hugging Face instead of quantizing via transformers ourselves, or
      (b) a newer transformers/bitsandbytes release with explicit fused-MoE-tensor support.
      int4_nf4_bnb/int4_nf4_doublequant_bnb are expected to hit the same structural gap
      regardless of target bit-width (untested). Do not trust any mixtral-8x7b bnb row until
      one of the above is resolved.
    runs:
      - quant_level: int8_baseline
        quant_method: bitsandbytes
        dtype: float16
        bnb_args:
          load_in_8bit: true
          load_in_4bit: false
      - quant_level: int4_nf4_bnb
        quant_method: bitsandbytes
        dtype: bfloat16
        bnb_args:
          load_in_8bit: false
          load_in_4bit: true
          bnb_4bit_quant_type: nf4
          bnb_4bit_compute_dtype: bfloat16
          bnb_4bit_use_double_quant: false
      - quant_level: int4_nf4_doublequant_bnb
        quant_method: bitsandbytes
        dtype: bfloat16
        bnb_args:
          load_in_8bit: false
          load_in_4bit: true
          bnb_4bit_quant_type: nf4
          bnb_4bit_compute_dtype: bfloat16
          bnb_4bit_use_double_quant: true
